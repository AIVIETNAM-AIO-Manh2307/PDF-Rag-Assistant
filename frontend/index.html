<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PDF RAG Assistant</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%; width: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      background: #fff;
      color: #111;
      overflow: hidden;
    }

    /* ══════════════════════════════════════
       APP SHELL — 3 cột
    ══════════════════════════════════════ */
    #app {
      display: grid;
      grid-template-columns: 240px 1fr 268px;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    /* ══════════════════════════════════════
       SIDEBAR
    ══════════════════════════════════════ */
    .rag-sidebar {
      background: #15152a;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid rgba(255,255,255,0.07);
    }

    .sb-logo {
      padding: 16px 14px 13px;
      display: flex; align-items: center; gap: 9px;
      font-size: 13.5px; font-weight: 600; color: #fff;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }
    .sb-logo-icon {
      width: 26px; height: 26px;
      background: rgba(139,92,246,0.22);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }

    .sb-section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
      color: rgba(255,255,255,0.28); text-transform: uppercase;
      padding: 10px 14px 5px;
      flex-shrink: 0;
    }

    .ws-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px;
    }
    .ws-list::-webkit-scrollbar { width: 3px; }
    .ws-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    .ws-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; border-radius: 8px; cursor: pointer;
      font-size: 12.5px; color: rgba(255,255,255,0.6);
      transition: background 0.12s, color 0.12s;
      margin-bottom: 1px;
      user-select: none;
    }
    .ws-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); }
    .ws-item.active { background: rgba(139,92,246,0.2); color: #c4b5fd; }
    .ws-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ws-item-count {
      font-size: 10px; padding: 1px 6px; border-radius: 10px;
      background: rgba(255,255,255,0.09); color: rgba(255,255,255,0.35);
      flex-shrink: 0;
    }
    .ws-item.active .ws-item-count { background: rgba(139,92,246,0.22); color: #c4b5fd; }

    .sb-divider {
      border: none; border-top: 1px solid rgba(255,255,255,0.07);
      margin: 6px 12px; flex-shrink: 0;
    }

    .create-ws {
      padding: 5px 8px 6px;
      display: flex; gap: 5px;
      flex-shrink: 0;
    }
    .create-ws input {
      flex: 1; background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 7px;
      padding: 6px 9px; font-size: 12px; color: #fff; outline: none;
      font-family: inherit;
    }
    .create-ws input::placeholder { color: rgba(255,255,255,0.28); }
    .create-ws input:focus { border-color: #8b5cf6; }

    .btn-new-ws {
      background: rgba(139,92,246,0.18);
      border: 1px solid rgba(139,92,246,0.35);
      border-radius: 7px; color: #c4b5fd;
      font-size: 18px; line-height: 1;
      width: 32px; cursor: pointer;
      transition: background 0.12s;
      flex-shrink: 0;
    }
    .btn-new-ws:hover { background: rgba(139,92,246,0.32); }

    .upload-zone {
      margin: 5px 8px;
      border: 1.5px dashed rgba(139,92,246,0.3);
      border-radius: 9px; padding: 12px 8px;
      text-align: center; cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      flex-shrink: 0;
    }
    .upload-zone:hover { background: rgba(139,92,246,0.07); border-color: rgba(139,92,246,0.55); }
    .upload-zone.dragover { background: rgba(139,92,246,0.12); border-color: #8b5cf6; }
    .upload-zone .uz-icon { font-size: 20px; margin-bottom: 3px; }
    .upload-zone p { font-size: 11px; color: rgba(255,255,255,0.32); line-height: 1.5; }
    .upload-zone p span { color: #a78bfa; text-decoration: underline; }

    /* Upload progress */
    .upload-progress {
      margin: 0 8px 2px;
      display: none;
      flex-shrink: 0;
    }
    .upload-progress.show { display: block; }
    .progress-bar-wrap {
      height: 4px; background: rgba(255,255,255,0.08);
      border-radius: 4px; overflow: hidden; margin-bottom: 4px;
    }
    .progress-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #8b5cf6, #c4b5fd);
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    .progress-label {
      font-size: 10.5px; color: rgba(255,255,255,0.35); text-align: center;
    }

    .upload-toast {
      margin: 0 8px 5px;
      padding: 6px 10px; border-radius: 7px;
      font-size: 11.5px; background: rgba(139,92,246,0.14);
      color: #c4b5fd; display: none;
      flex-shrink: 0;
      line-height: 1.4;
    }
    .upload-toast.show { display: block; }
    .upload-toast.error { background: rgba(220,60,60,0.12); color: #fca5a5; }

    .sb-tools { padding: 6px 8px 10px; flex-shrink: 0; }
    .tool-btn {
      width: 100%; display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; border-radius: 8px; background: transparent;
      border: none; color: rgba(255,255,255,0.45); font-size: 12.5px;
      cursor: pointer; text-align: left;
      transition: background 0.12s, color 0.12s;
      font-family: inherit; margin-bottom: 1px;
    }
    .tool-btn:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.82); }
    .tool-btn.danger:hover { background: rgba(220,60,60,0.1); color: #fca5a5; }

    /* ══════════════════════════════════════
       CHAT AREA
    ══════════════════════════════════════ */
    .rag-chat {
      display: flex; flex-direction: column;
      background: #fff; overflow: hidden;
    }

    .chat-topbar {
      padding: 12px 20px;
      border-bottom: 1px solid #f0edff;
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    .chat-topbar-title { font-size: 13.5px; font-weight: 600; color: #111; }
    .ws-pill {
      font-size: 11.5px; background: #f0edff; color: #6d28d9;
      padding: 3px 11px; border-radius: 20px;
      border: 1px solid #ddd6fe; font-weight: 500;
    }
    .topbar-spacer { flex: 1; }
    .api-status {
      font-size: 10.5px; display: flex; align-items: center; gap: 4px;
      color: rgba(0,0,0,0.3);
    }
    .api-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #d1d5db;
      transition: background 0.3s;
    }
    .api-dot.ok { background: #22c55e; }
    .api-dot.err { background: #ef4444; }

    .chat-msgs {
      flex: 1; overflow-y: auto; padding: 20px 22px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .chat-msgs::-webkit-scrollbar { width: 4px; }
    .chat-msgs::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 4px; }

    /* welcome */
    .welcome {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; gap: 10px;
      color: rgba(0,0,0,0.3); text-align: center;
    }
    .welcome .w-icon { font-size: 40px; color: rgba(0,0,0,0.2); }
    .welcome h2 { font-size: 16px; font-weight: 500; color: rgba(0,0,0,0.45); }
    .welcome p { font-size: 12.5px; max-width: 260px; line-height: 1.6; }

    /* message rows */
    .msg { display: flex; gap: 9px; align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }

    .av {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600;
    }
    .av.bot { background: #15152a; color: #a78bfa; font-size: 13px; }
    .av.user { background: #f0edff; color: #6d28d9; }

    .bub {
      max-width: 76%; padding: 9px 13px; line-height: 1.65;
      font-size: 13px; color: #111;
    }
    .bub.bot {
      background: #f8f7ff; border: 1px solid #ede9fe;
      border-radius: 4px 14px 14px 14px;
    }
    .bub.user {
      background: #f0edff; border: 1px solid #ddd6fe;
      border-radius: 14px 4px 14px 14px;
    }

    .cite-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 7px; }
    .cite-chip {
      font-size: 11px; background: #f5f3ff; color: #6d28d9;
      border: 1px solid #ddd6fe; border-radius: 5px;
      padding: 2px 8px; cursor: pointer; font-weight: 500;
      transition: background 0.1s;
    }
    .cite-chip:hover { background: #ede9fe; }

    /* typing dots */
    .typing { display: flex; gap: 4px; align-items: center; padding: 10px 13px; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%; background: #c4b5fd;
      display: block; animation: tdot 1.2s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes tdot {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* explain bar */
    .explain-bar {
      flex-shrink: 0;
      padding: 0 20px 10px;
    }
    .explain-inner {
      display: flex; align-items: center; gap: 7px;
      background: #f5f3ff; border: 1px solid #ddd6fe;
      border-radius: 9px; padding: 7px 12px;
    }
    .explain-inner .ei-label { font-size: 12px; color: #7c3aed; white-space: nowrap; }
    .explain-inner input {
      flex: 1; background: transparent; border: none; outline: none;
      font-size: 12.5px; color: #111; font-family: inherit;
    }
    .explain-inner input::placeholder { color: rgba(0,0,0,0.28); }
    .btn-explain {
      background: #15152a; border: none; border-radius: 7px;
      padding: 4px 12px; color: #c4b5fd; font-size: 12px;
      cursor: pointer; white-space: nowrap; font-family: inherit;
    }
    .btn-explain:hover { opacity: 0.85; }

    /* chat input */
    .chat-input-area {
      flex-shrink: 0;
      padding: 10px 20px 14px;
      border-top: 1px solid #f0edff;
    }
    .chat-input-row {
      display: flex; gap: 8px; align-items: flex-end;
      background: #faf8ff; border: 1.5px solid #ddd6fe;
      border-radius: 12px; padding: 9px 12px;
      transition: border-color .15s, box-shadow .15s;
    }
    .chat-input-row:focus-within {
      border-color: #8b5cf6;
      box-shadow: 0 0 0 3px rgba(139,92,246,.1);
    }
    .chat-input-row textarea {
      flex: 1; background: transparent; border: none; outline: none;
      font-size: 13px; color: #111; resize: none; font-family: inherit;
      line-height: 1.5; max-height: 110px; min-height: 20px;
    }
    .chat-input-row textarea::placeholder { color: rgba(0,0,0,0.28); }
    .btn-send {
      background: #15152a; border: none; border-radius: 8px;
      width: 32px; height: 32px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: opacity .15s;
    }
    .btn-send:hover { opacity: .8; }
    .btn-send svg { width: 14px; height: 14px; fill: #a78bfa; }

    /* ══════════════════════════════════════
       SOURCES PANEL
    ══════════════════════════════════════ */
    .rag-sources {
      background: #fafafa;
      border-left: 1px solid #ede9fe;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .src-header {
      padding: 12px 14px;
      border-bottom: 1px solid #ede9fe;
      display: flex; align-items: center; gap: 6px;
      flex-shrink: 0;
    }
    .src-header-title { font-size: 13px; font-weight: 600; color: #111; flex: 1; }
    .src-file-badge {
      font-size: 10.5px; background: #f0edff; color: #6d28d9;
      padding: 2px 8px; border-radius: 10px; border: 1px solid #ddd6fe;
    }

    .src-list {
      flex: 1; overflow-y: auto; padding: 8px;
    }
    .src-list::-webkit-scrollbar { width: 3px; }
    .src-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }

    .src-card {
      padding: 9px 11px; border-radius: 8px; cursor: pointer;
      border: 1px solid transparent; margin-bottom: 4px;
      transition: background .12s, border-color .12s;
    }
    .src-card:hover { background: #f0edff; border-color: #ddd6fe; }
    .src-card.active { background: #ede9fe; border-color: #8b5cf6; }

    .src-card-name {
      font-size: 12px; font-weight: 600; color: #111;
      display: flex; align-items: center; gap: 5px; margin-bottom: 2px;
    }
    .src-card-name .pdf-ico { color: #8b5cf6; font-size: 13px; }
    .src-card-meta { font-size: 10.5px; color: rgba(0,0,0,0.38); }
    .src-snippet {
      margin-top: 6px; font-size: 11px; color: #5b21b6; line-height: 1.55;
      padding: 5px 8px; background: #f5f3ff;
      border-left: 2px solid #c4b5fd; border-radius: 0 5px 5px 0;
      display: none;
    }
    .src-card.active .src-snippet { display: block; }

    .src-upload-card {
      margin: 4px 0;
      border: 1.5px dashed rgba(139,92,246,.28); border-radius: 8px;
      padding: 12px; text-align: center; cursor: pointer;
      transition: background .12s;
    }
    .src-upload-card:hover { background: #f0edff; border-color: rgba(139,92,246,.55); }
    .src-upload-card p { font-size: 11.5px; color: rgba(0,0,0,.35); margin-top: 3px; }

    /* panel explain */
    .panel-explain {
      margin: 4px 8px 10px; padding: 10px 12px;
      background: #f5f3ff; border-radius: 9px; border: 1px solid #ddd6fe;
      flex-shrink: 0;
    }
    .pe-label { font-size: 11px; color: #7c3aed; font-weight: 600; margin-bottom: 6px; }
    .pe-row { display: flex; gap: 5px; }
    .pe-row input {
      flex: 1; background: #fff; border: 1px solid #ddd6fe;
      border-radius: 6px; padding: 5px 8px; font-size: 11.5px; color: #111;
      outline: none; font-family: inherit;
    }
    .pe-row input:focus { border-color: #8b5cf6; }
    .btn-pe {
      background: #15152a; border: none; border-radius: 6px;
      padding: 5px 11px; color: #c4b5fd; font-size: 11.5px; cursor: pointer;
      font-family: inherit;
    }
    .btn-pe:hover { opacity: 0.85; }
    .pe-result {
      margin-top: 7px; font-size: 11.5px; color: #111; line-height: 1.55;
      padding: 6px 9px; background: #fff; border-radius: 6px;
      border: 1px solid #ddd6fe; display: none;
    }
    .pe-result.show { display: block; }

    /* Hidden file input */
    #fileInput { display: none; }
  </style>
</head>
<body>

<input type="file" id="fileInput" accept=".pdf" multiple/>

<div id="app">

  <!-- ══ SIDEBAR ══ -->
  <aside class="rag-sidebar">
    <div class="sb-logo">
      <div class="sb-logo-icon">📚</div>
      PDF RAG Assistant
    </div>

    <div class="sb-section-label">Workspaces</div>
    <div class="ws-list" id="wsList"></div>

    <div class="create-ws">
      <input type="text" id="newWsInput" placeholder="Tên workspace mới..."/>
      <button class="btn-new-ws" id="btnCreateWs" title="Tạo workspace">+</button>
    </div>

    <hr class="sb-divider"/>

    <div class="upload-zone" id="btnUploadZone">
      <div class="uz-icon">☁️</div>
      <p>Kéo thả PDF vào đây<br/>hoặc <span>chọn file</span></p>
    </div>

    <div class="upload-progress" id="uploadProgress">
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="progress-label" id="progressLabel">Đang xử lý...</div>
    </div>

    <div class="upload-toast" id="uploadToast"></div>

    <hr class="sb-divider"/>

    <div class="sb-tools">
      <button class="tool-btn" id="btnSummarize">📝&nbsp; Tóm tắt tài liệu</button>
      <button class="tool-btn danger" id="btnClearChat">🗑️&nbsp; Xóa lịch sử chat</button>
    </div>
  </aside>

  <!-- ══ CHAT ══ -->
  <main class="rag-chat">
    <div class="chat-topbar">
      <span class="chat-topbar-title">💬 Chat</span>
      <span class="ws-pill" id="wsPill">—</span>
      <span class="topbar-spacer"></span>
      <span class="api-status">
        <span class="api-dot" id="apiDot"></span>
        <span id="apiLabel">API</span>
      </span>
    </div>

    <div class="chat-msgs" id="chatMsgs"></div>

    <div class="explain-bar">
      <div class="explain-inner">
        <span class="ei-label">🔍</span>
        <input type="text" id="explainInput" placeholder="Tra thuật ngữ nhanh... (vd: gradient descent)"/>
        <button class="btn-explain" id="btnExplain">Tra cứu</button>
      </div>
    </div>

    <div class="chat-input-area">
      <div class="chat-input-row">
        <textarea id="chatInput" rows="1" placeholder="Chọn workspace trước..."></textarea>
        <button class="btn-send" id="btnSend">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
        </button>
      </div>
    </div>
  </main>

  <!-- ══ SOURCES PANEL ══ -->
  <aside class="rag-sources">
    <div class="src-header">
      <span class="src-header-title">📄 Nguồn tài liệu</span>
      <span class="src-file-badge" id="srcBadge">0 file(s)</span>
    </div>
    <div class="src-list" id="srcList"></div>
    <div class="panel-explain">
      <div class="pe-label">🔍 Tra thuật ngữ trong tài liệu</div>
      <div class="pe-row">
        <input type="text" id="peInput" placeholder="epsilon-delta, Big-O..."/>
        <button class="btn-pe" id="btnPanelExplain">Tra</button>
      </div>
      <div class="pe-result" id="peResult"></div>
    </div>
  </aside>

</div>

<script>
// ══════════════════════════════════════════════════════════════
//  CONFIG — đổi URL nếu backend ở server khác
// ══════════════════════════════════════════════════════════════
const API = 'http://localhost:8000';

// ══════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════
let workspaces  = [];
let selectedWs  = null;
let chatHistory = [];
let activeSrc   = -1;

// ══════════════════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════════════════
(async function init() {
  bindEvents();
  await checkApiHealth();
  await loadWorkspaces();
  renderAll();
})();

// ══════════════════════════════════════════════════════════════
//  BIND EVENTS
// ══════════════════════════════════════════════════════════════
function bindEvents() {
  // Sidebar buttons
  document.getElementById('btnCreateWs').addEventListener('click', createWs);
  document.getElementById('btnSummarize').addEventListener('click', doSummarize);
  document.getElementById('btnClearChat').addEventListener('click', doClearChat);
  document.getElementById('btnUploadZone').addEventListener('click', triggerUpload);

  // Chat
  document.getElementById('btnSend').addEventListener('click', sendMsg);
  document.getElementById('btnExplain').addEventListener('click', doExplain);

  // Sources panel
  document.getElementById('btnPanelExplain').addEventListener('click', doPanelExplain);

  // Keyboard
  document.getElementById('newWsInput').addEventListener('keydown', e => { if (e.key === 'Enter') createWs(); });
  document.getElementById('explainInput').addEventListener('keydown', e => { if (e.key === 'Enter') doExplain(); });
  document.getElementById('peInput').addEventListener('keydown', e => { if (e.key === 'Enter') doPanelExplain(); });

  const ta = document.getElementById('chatInput');
  ta.addEventListener('input', () => autoH(ta));
  ta.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } });

  // Event delegation — dynamic elements
  document.getElementById('wsList').addEventListener('click', e => {
    const item = e.target.closest('.ws-item');
    if (item) selectWs(item.dataset.wsName);
  });
  document.getElementById('srcList').addEventListener('click', e => {
    const card = e.target.closest('.src-card');
    if (card) toggleSrc(parseInt(card.dataset.srcIdx));
    const up = e.target.closest('.src-upload-card');
    if (up) triggerUpload();
  });
  document.getElementById('chatMsgs').addEventListener('click', e => {
    const chip = e.target.closest('.cite-chip');
    if (chip) highlightSrc(chip.dataset.fileName);
  });

  // File input
  const fi = document.getElementById('fileInput');
  fi.addEventListener('change', () => uploadFiles(fi.files));

  // Drag & drop trên upload zone
  const zone = document.getElementById('btnUploadZone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('dragover');
    uploadFiles(e.dataTransfer.files);
  });
}

// ══════════════════════════════════════════════════════════════
//  API HEALTH CHECK
// ══════════════════════════════════════════════════════════════
async function checkApiHealth() {
  const dot   = document.getElementById('apiDot');
  const label = document.getElementById('apiLabel');
  try {
    const r = await fetch(`${API}/health`, { signal: AbortSignal.timeout(3000) });
    if (r.ok) {
      dot.className = 'api-dot ok';
      label.textContent = 'API online';
    } else throw new Error();
  } catch {
    dot.className = 'api-dot err';
    label.textContent = 'API offline';
  }
}

// ══════════════════════════════════════════════════════════════
//  WORKSPACE
// ══════════════════════════════════════════════════════════════
async function loadWorkspaces() {
  try {
    const r = await fetch(`${API}/api/workspaces`);
    if (!r.ok) throw new Error();
    const raw = await r.json();
    // Mỗi phần tử: { name, file_count } — enrich thêm files[]
    workspaces = await Promise.all(raw.map(async ws => {
      try {
        const fr = await fetch(`${API}/api/workspaces/${encodeURIComponent(ws.name)}/files`);
        const files = fr.ok ? await fr.json() : [];
        return { ...ws, files: files.map(f => typeof f === 'string' ? { name: f } : f) };
      } catch { return { ...ws, files: [] }; }
    }));
  } catch {
    workspaces = [];
  }
}

function renderAll() {
  renderWsList();
  renderChat();
  renderSources();
}

function renderWsList() {
  const el = document.getElementById('wsList');
  if (!workspaces.length) {
    el.innerHTML = '<div style="padding:8px 12px;font-size:11.5px;color:rgba(255,255,255,.25)">Chưa có workspace nào</div>';
    return;
  }
  el.innerHTML = workspaces.map(w => `
    <div class="ws-item ${w.name === selectedWs ? 'active' : ''}" data-ws-name="${esc(w.name)}">
      <span>${w.name === selectedWs ? '📂' : '📁'}</span>
      <span class="ws-item-name">${esc(w.name)}</span>
      <span class="ws-item-count">${w.file_count}</span>
    </div>`).join('');
}

async function selectWs(name) {
  if (name === selectedWs) return;
  selectedWs  = name;
  chatHistory = [];
  activeSrc   = -1;
  // Reload files cho workspace này
  await reloadWsFiles(name);
  renderAll();
}

async function reloadWsFiles(name) {
  const idx = workspaces.findIndex(w => w.name === name);
  if (idx < 0) return;
  try {
    const r = await fetch(`${API}/api/workspaces/${encodeURIComponent(name)}/files`);
    const files = r.ok ? await r.json() : [];
    workspaces[idx].files = files.map(f => typeof f === 'string' ? { name: f } : f);
    workspaces[idx].file_count = files.length;
  } catch { /* giữ nguyên */ }
}

async function createWs() {
  const inp  = document.getElementById('newWsInput');
  const name = inp.value.trim();
  if (!name) return;
  inp.value = '';
  try {
    const r = await fetch(`${API}/api/workspaces`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name })
    });
    if (r.status === 201 || r.ok) {
      await loadWorkspaces();
      selectedWs  = name;
      chatHistory = [];
      activeSrc   = -1;
      renderAll();
      showToast(`✅ Đã tạo workspace "${name}"`, false);
    } else {
      showToast('❌ Không tạo được workspace', true);
    }
  } catch { showToast('❌ Lỗi kết nối tới server', true); }
}

function doClearChat() {
  chatHistory = [];
  renderChat();
}

// ══════════════════════════════════════════════════════════════
//  UPLOAD PDF
// ══════════════════════════════════════════════════════════════
function triggerUpload() {
  if (!selectedWs) { showToast('⚠️ Chọn workspace trước!', true); return; }
  document.getElementById('fileInput').click();
}

async function uploadFiles(fileList) {
  if (!fileList || !fileList.length) return;
  if (!selectedWs) { showToast('⚠️ Chọn workspace trước!', true); return; }

  const progress = document.getElementById('uploadProgress');
  const bar      = document.getElementById('progressBar');
  const lbl      = document.getElementById('progressLabel');

  let done = 0;
  const total = fileList.length;

  progress.classList.add('show');
  bar.style.width = '0%';

  for (const file of fileList) {
    lbl.textContent = `Đang upload: ${file.name} (${done + 1}/${total})...`;
    bar.style.width = `${Math.round((done / total) * 90)}%`;

    const fd = new FormData();
    fd.append('file', file);
    fd.append('workspace_name', selectedWs);

    try {
      const r   = await fetch(`${API}/api/upload`, { method: 'POST', body: fd });
      const res = await r.json();
      if (res.status === 'success') {
        done++;
        showToast(`✅ ${res.file_name}: ${res.chunk_count} chunks · ${res.page_count} trang`, false);
      } else {
        showToast(`❌ ${file.name}: ${res.detail || res.message || 'Upload thất bại'}`, true);
      }
    } catch (e) {
      showToast(`❌ ${file.name}: Lỗi kết nối`, true);
    }
  }

  bar.style.width = '100%';
  lbl.textContent = `Hoàn thành ${done}/${total} file`;
  setTimeout(() => progress.classList.remove('show'), 2000);

  // Reset input
  document.getElementById('fileInput').value = '';

  // Reload workspace để cập nhật file list
  await reloadWsFiles(selectedWs);
  renderWsList();
  renderSources();
}

// ══════════════════════════════════════════════════════════════
//  TOPBAR PILL
// ══════════════════════════════════════════════════════════════
function updatePill() {
  document.getElementById('wsPill').textContent = selectedWs || '—';
  document.getElementById('chatInput').placeholder =
    selectedWs ? `Hỏi về tài liệu trong ${selectedWs}...` : 'Chọn workspace trước...';
}

// ══════════════════════════════════════════════════════════════
//  SOURCES PANEL
// ══════════════════════════════════════════════════════════════
function renderSources() {
  updatePill();
  const ws    = workspaces.find(w => w.name === selectedWs);
  const files = ws?.files || [];
  document.getElementById('srcBadge').textContent = `${files.length} file(s)`;

  const list    = document.getElementById('srcList');
  const upCard  = `<div class="src-upload-card"><p>☁️ Click để upload PDF vào workspace này</p></div>`;

  if (!files.length) { list.innerHTML = upCard; return; }

  list.innerHTML = files.map((f, i) => {
    const name = f.name || f;
    return `<div class="src-card ${i === activeSrc ? 'active' : ''}" id="sc${i}" data-src-idx="${i}">
      <div class="src-card-name"><span class="pdf-ico">📕</span>${esc(name)}</div>
      <div class="src-card-meta">${f.page_count ? f.page_count + ' trang · ' : ''}${f.chunk_count ? f.chunk_count + ' chunks' : ''}</div>
      <div class="src-snippet">${f.snippet || 'Nhấn để xem trích đoạn liên quan.'}</div>
    </div>`;
  }).join('') + upCard;
}

function toggleSrc(i) {
  activeSrc = activeSrc === i ? -1 : i;
  renderSources();
}

function highlightSrc(fileName) {
  const ws    = workspaces.find(w => w.name === selectedWs);
  const files = ws?.files || [];
  const i     = files.findIndex(f => (f.name || f) === fileName);
  if (i >= 0) {
    activeSrc = i;
    renderSources();
    document.getElementById(`sc${i}`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// ══════════════════════════════════════════════════════════════
//  CHAT
// ══════════════════════════════════════════════════════════════
function renderChat() {
  updatePill();
  const el = document.getElementById('chatMsgs');
  if (!selectedWs) {
    el.innerHTML = `<div class="welcome">
      <div class="w-icon">📚</div>
      <h2>PDF RAG Assistant</h2>
      <p>Tạo hoặc chọn một <strong>Workspace</strong> bên trái để bắt đầu.</p>
    </div>`; return;
  }
  if (!chatHistory.length) {
    el.innerHTML = `<div class="welcome">
      <div class="w-icon" style="font-size:36px;color:rgba(0,0,0,.15)">💬</div>
      <h2>Workspace: ${esc(selectedWs)}</h2>
      <p>Upload PDF vào sidebar rồi đặt câu hỏi về nội dung tài liệu bên dưới.</p>
    </div>`; return;
  }
  el.innerHTML = chatHistory.map(msgHTML).join('');
  el.scrollTop = el.scrollHeight;
}

function msgHTML(m) {
  const isUser = m.role === 'user';
  const av     = isUser ? '<div class="av user">M</div>' : '<div class="av bot">✦</div>';
  const bub    = `<div class="bub ${isUser ? 'user' : 'bot'}">${m.content}</div>`;
  const chips  = (!isUser && m.citations?.length)
    ? `<div class="cite-chips">${m.citations.map(c =>
        `<span class="cite-chip" data-file-name="${esc(c.file_name)}">
          📄 ${esc(c.file_name)} · Tr.${c.page}${c.heading ? ' · ' + esc(c.heading) : ''}
        </span>`).join('')}</div>` : '';
  const body = `<div style="display:flex;flex-direction:column;gap:4px;max-width:76%">${bub}${chips}</div>`;
  return `<div class="msg ${isUser ? 'user' : ''}">${isUser ? body + av : av + body}</div>`;
}

function addTyping() {
  const el = document.getElementById('chatMsgs');
  const d  = document.createElement('div');
  d.className = 'msg'; d.id = 'typing';
  d.innerHTML = '<div class="av bot">✦</div><div class="bub bot"><div class="typing"><span></span><span></span><span></span></div></div>';
  el.appendChild(d); el.scrollTop = el.scrollHeight;
}
function rmTyping() { document.getElementById('typing')?.remove(); }

async function sendMsg() {
  const inp = document.getElementById('chatInput');
  const q   = inp.value.trim();
  if (!q || !selectedWs) return;
  inp.value = ''; autoH(inp);
  chatHistory.push({ role: 'user', content: esc(q) });
  renderChat(); addTyping();
  try {
    const r = await fetch(`${API}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q, workspace_name: selectedWs, top_k: 5 })
    });
    const d = await r.json(); rmTyping();
    chatHistory.push({
      role: 'assistant',
      content: d.answer || 'Không nhận được câu trả lời.',
      citations: d.citations || []
    });
  } catch (e) {
    rmTyping();
    chatHistory.push({ role: 'assistant', content: `❌ Lỗi kết nối: ${e.message}`, citations: [] });
  }
  renderChat();
}

// ══════════════════════════════════════════════════════════════
//  SUMMARIZE
// ══════════════════════════════════════════════════════════════
async function doSummarize() {
  if (!selectedWs) { showToast('⚠️ Chọn workspace trước!', true); return; }
  addTyping();
  try {
    const r = await fetch(`${API}/api/summarize`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ workspace_name: selectedWs })
    });
    const d = await r.json(); rmTyping();
    chatHistory.push({
      role: 'assistant',
      content: '📝 <strong>Tóm tắt:</strong><br/>' + (d.summary || 'Không có nội dung.'),
      citations: []
    });
  } catch (e) { rmTyping(); showToast('Lỗi: ' + e.message, true); }
  renderChat();
}

// ══════════════════════════════════════════════════════════════
//  EXPLAIN (inline)
// ══════════════════════════════════════════════════════════════
async function doExplain() {
  const term = document.getElementById('explainInput').value.trim();
  if (!term || !selectedWs) { showToast('⚠️ Nhập thuật ngữ và chọn workspace!', true); return; }
  document.getElementById('explainInput').value = '';
  addTyping();
  try {
    const r = await fetch(`${API}/api/explain`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ term, workspace_name: selectedWs })
    });
    const d = await r.json(); rmTyping();
    chatHistory.push({
      role: 'assistant',
      content: `🔍 <strong>${esc(term)}:</strong> ${d.explanation || 'Không tìm thấy.'}`,
      citations: d.citations || []
    });
    renderChat();
  } catch (e) { rmTyping(); showToast('Lỗi: ' + e.message, true); }
}

// ══════════════════════════════════════════════════════════════
//  EXPLAIN (sources panel)
// ══════════════════════════════════════════════════════════════
async function doPanelExplain() {
  const term = document.getElementById('peInput').value.trim();
  const res  = document.getElementById('peResult');
  if (!term || !selectedWs) return;
  res.textContent = 'Đang tra cứu...'; res.classList.add('show');
  try {
    const r = await fetch(`${API}/api/explain`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ term, workspace_name: selectedWs })
    });
    const d = await r.json();
    res.innerHTML = `<strong>${esc(term)}:</strong> ${d.explanation || 'Không tìm thấy.'}`;
  } catch (e) { res.textContent = 'Lỗi: ' + e.message; }
}

// ══════════════════════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════════════════════
let _toastTimer = null;
function showToast(msg, isError = false, ms = 5000) {
  const t = document.getElementById('uploadToast');
  t.textContent = msg;
  t.className   = 'upload-toast show' + (isError ? ' error' : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), ms);
}

// ══════════════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════════════
function esc(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function autoH(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}
</script>
