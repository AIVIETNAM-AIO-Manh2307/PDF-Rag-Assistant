<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PDF RAG Assistant</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ══════════════════════════════════════
       DESIGN TOKENS — UNIFIED DARK THEME
    ══════════════════════════════════════ */
    :root {
      /* Surfaces */
      --bg-base:       #0d0d1a;   /* deepest bg */
      --bg-sidebar:    #111122;   /* sidebar */
      --bg-chat:       #13131f;   /* chat area */
      --bg-panel:      #111122;   /* sources panel — same as sidebar */
      --bg-elevated:   #1a1a2e;   /* cards, inputs */
      --bg-hover:      #1f1f38;
      --bg-active:     rgba(139,92,246,.18);

      /* Borders */
      --border:        rgba(255,255,255,0.07);
      --border-accent: rgba(139,92,246,0.35);

      /* Accent */
      --accent:        #8b5cf6;
      --accent-light:  #c4b5fd;
      --accent-faint:  rgba(139,92,246,0.12);
      --accent-glow:   rgba(139,92,246,0.08);

      /* Text */
      --text-primary:  #f0efff;
      --text-secondary: rgba(255,255,255,0.55);
      --text-muted:    rgba(255,255,255,0.28);

      /* Status */
      --green:  #22c55e;
      --red:    #ef4444;

      /* Radii & spacing */
      --r-sm: 6px;
      --r-md: 10px;
      --r-lg: 14px;
    }

    html, body {
      height: 100%; width: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      background: var(--bg-base);
      color: var(--text-primary);
      overflow: hidden;
    }

    /* ══════════════════════════════════════
       APP SHELL — 3 cột
    ══════════════════════════════════════ */
    #app {
      display: grid;
      grid-template-columns: 248px 1fr 272px;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    /* ══════════════════════════════════════
       SIDEBAR
    ══════════════════════════════════════ */
    .rag-sidebar {
      background: var(--bg-sidebar);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--border);
    }

    /* Logo */
    .sb-logo {
      padding: 15px 14px 14px;
      display: flex; align-items: center; gap: 10px;
      font-size: 13.5px; font-weight: 600; color: var(--text-primary);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      letter-spacing: -0.01em;
    }
    .sb-logo-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, rgba(139,92,246,0.35), rgba(139,92,246,0.15));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      border: 1px solid var(--border-accent);
    }

    /* Section label */
    .sb-section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.09em;
      color: var(--text-muted); text-transform: uppercase;
      padding: 12px 14px 5px;
      flex-shrink: 0;
    }

    /* Workspace list */
    .ws-list {
      flex: 1;
      overflow-y: auto;
      padding: 3px 8px;
      min-height: 0;
    }
    .ws-list::-webkit-scrollbar { width: 3px; }
    .ws-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

    .ws-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; border-radius: var(--r-md); cursor: pointer;
      font-size: 12.5px; color: var(--text-secondary);
      transition: background 0.12s, color 0.12s;
      margin-bottom: 1px;
      user-select: none;
    }
    .ws-item:hover { background: var(--bg-hover); color: var(--text-primary); }
    .ws-item.active { background: var(--bg-active); color: var(--accent-light); }
    .ws-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ws-item-count {
      font-size: 10px; padding: 1px 6px; border-radius: 10px;
      background: rgba(255,255,255,0.07); color: var(--text-muted);
      flex-shrink: 0;
    }
    .ws-item.active .ws-item-count { background: rgba(139,92,246,0.22); color: var(--accent-light); }
    .ws-empty-hint {
      padding: 8px 12px;
      font-size: 11.5px;
      color: var(--text-muted);
    }

    /* Divider */
    .sb-divider {
      border: none; border-top: 1px solid var(--border);
      margin: 5px 12px; flex-shrink: 0;
    }

    /* Create workspace */
    .create-ws {
      padding: 5px 8px 6px;
      display: flex; gap: 5px;
      flex-shrink: 0;
    }
    .create-ws input {
      flex: 1;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 6px 9px; font-size: 12px;
      color: var(--text-primary); outline: none;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .create-ws input::placeholder { color: var(--text-muted); }
    .create-ws input:focus { border-color: var(--accent); }

    .btn-new-ws {
      background: var(--accent-faint);
      border: 1px solid var(--border-accent);
      border-radius: var(--r-sm); color: var(--accent-light);
      font-size: 18px; line-height: 1;
      width: 32px; cursor: pointer;
      transition: background 0.12s;
      flex-shrink: 0;
    }
    .btn-new-ws:hover { background: rgba(139,92,246,0.28); }

    /* Upload zone — sidebar only */
    .upload-zone {
      margin: 4px 8px;
      border: 1.5px dashed var(--border-accent);
      border-radius: var(--r-md); padding: 12px 8px;
      text-align: center; cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      flex-shrink: 0;
    }
    .upload-zone:hover { background: var(--accent-glow); border-color: var(--accent); }
    .upload-zone.dragover { background: rgba(139,92,246,0.14); border-color: var(--accent); }
    .upload-zone .uz-icon { font-size: 18px; margin-bottom: 4px; }
    .upload-zone p { font-size: 11px; color: var(--text-muted); line-height: 1.5; }
    .upload-zone p span { color: var(--accent-light); text-decoration: underline; cursor: pointer; }

    /* Upload progress */
    .upload-progress { margin: 0 8px 2px; display: none; flex-shrink: 0; }
    .upload-progress.show { display: block; }
    .progress-bar-wrap { height: 3px; background: rgba(255,255,255,0.07); border-radius: 4px; overflow: hidden; margin-bottom: 4px; }
    .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent-light)); border-radius: 4px; transition: width 0.3s ease; }
    .progress-label { font-size: 10.5px; color: var(--text-muted); text-align: center; }

    /* Toast */
    .upload-toast {
      margin: 0 8px 4px;
      padding: 6px 10px; border-radius: var(--r-sm);
      font-size: 11.5px;
      background: rgba(139,92,246,0.14);
      color: var(--accent-light);
      display: none; flex-shrink: 0; line-height: 1.4;
    }
    .upload-toast.show { display: block; }
    .upload-toast.error { background: rgba(220,60,60,0.12); color: #fca5a5; }

    /* Sidebar bottom tools */
    .sb-tools { padding: 5px 8px 10px; flex-shrink: 0; }
    .tool-btn {
      width: 100%; display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; border-radius: var(--r-md);
      background: transparent; border: none;
      color: var(--text-muted); font-size: 12.5px;
      cursor: pointer; text-align: left;
      transition: background 0.12s, color 0.12s;
      font-family: inherit; margin-bottom: 1px;
    }
    .tool-btn:hover { background: var(--bg-hover); color: var(--text-secondary); }
    .tool-btn.danger:hover { background: rgba(220,60,60,0.1); color: #fca5a5; }

    /* ══════════════════════════════════════
       CHAT AREA
    ══════════════════════════════════════ */
    .rag-chat {
      display: flex; flex-direction: column;
      background: var(--bg-chat);
      overflow: hidden;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    /* Topbar */
    .chat-topbar {
      padding: 11px 18px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
      background: var(--bg-chat);
    }
    .chat-topbar-title { font-size: 13.5px; font-weight: 600; color: var(--text-primary); }
    .ws-pill {
      font-size: 11.5px;
      background: var(--accent-faint);
      color: var(--accent-light);
      padding: 3px 10px; border-radius: 20px;
      border: 1px solid var(--border-accent);
      font-weight: 500;
    }
    .topbar-spacer { flex: 1; }

    /* Summarize button in topbar */
    .btn-summarize-top {
      display: flex; align-items: center; gap: 5px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 5px 11px;
      color: var(--text-secondary); font-size: 12px;
      cursor: pointer; font-family: inherit;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }
    .btn-summarize-top:hover {
      background: var(--bg-hover);
      color: var(--accent-light);
      border-color: var(--border-accent);
    }

    .api-status { font-size: 10.5px; display: flex; align-items: center; gap: 4px; color: var(--text-muted); }
    .api-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.18); transition: background 0.3s; }
    .api-dot.ok { background: var(--green); }
    .api-dot.err { background: var(--red); }

    /* Messages */
    .chat-msgs {
      flex: 1; overflow-y: auto; padding: 20px 22px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .chat-msgs::-webkit-scrollbar { width: 4px; }
    .chat-msgs::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

    /* Welcome state */
    .welcome {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; gap: 12px;
      text-align: center;
    }
    .welcome .w-icon { font-size: 40px; opacity: 0.35; }
    .welcome h2 { font-size: 16px; font-weight: 500; color: var(--text-secondary); }
    .welcome p { font-size: 12.5px; max-width: 260px; line-height: 1.65; color: var(--text-muted); }
    .welcome strong { color: var(--accent-light); }

    /* Quick action chips on welcome screen */
    .welcome-chips {
      display: flex; flex-wrap: wrap; gap: 6px;
      justify-content: center; margin-top: 4px; max-width: 320px;
    }
    .welcome-chip {
      font-size: 11.5px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 5px 12px; border-radius: 20px; cursor: pointer;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .welcome-chip:hover {
      background: var(--bg-hover);
      border-color: var(--border-accent);
      color: var(--accent-light);
    }

    /* Message rows */
    .msg { display: flex; gap: 10px; align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }

    .av {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600;
    }
    .av.bot {
      background: linear-gradient(135deg, rgba(139,92,246,0.3), rgba(139,92,246,0.1));
      color: var(--accent-light); font-size: 13px;
      border: 1px solid var(--border-accent);
    }
    .av.user { background: var(--bg-elevated); color: var(--accent-light); border: 1px solid var(--border); }

    .bub {
      max-width: 76%; padding: 10px 14px; line-height: 1.7;
      font-size: 13px; color: var(--text-primary);
    }
    .bub.bot {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 3px 14px 14px 14px;
    }
    .bub.user {
      background: var(--bg-active);
      border: 1px solid var(--border-accent);
      border-radius: 14px 3px 14px 14px;
      color: var(--accent-light);
    }

    /* Citation chips */
    .cite-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .cite-chip {
      font-size: 11px;
      background: rgba(139,92,246,0.1);
      color: var(--accent-light);
      border: 1px solid var(--border-accent);
      border-radius: var(--r-sm);
      padding: 2px 9px; cursor: pointer; font-weight: 500;
      transition: background 0.1s;
    }
    .cite-chip:hover { background: rgba(139,92,246,0.22); }

    /* Typing dots */
    .typing { display: flex; gap: 4px; align-items: center; padding: 10px 14px; }
    .typing span {
      width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
      display: block; animation: tdot 1.2s infinite ease-in-out; opacity: 0.6;
    }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes tdot {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* Chat input area */
    .chat-input-area {
      flex-shrink: 0;
      padding: 12px 18px 15px;
      background: var(--bg-chat);
    }
    .chat-input-box {
      display: flex; flex-direction: column;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 10px 12px 8px;
      transition: border-color .15s, box-shadow .15s;
    }
    .chat-input-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(139,92,246,.08);
    }
    .chat-input-box textarea {
      background: transparent; border: none; outline: none;
      font-size: 13.5px; color: var(--text-primary); resize: none;
      font-family: inherit; line-height: 1.55;
      max-height: 120px; min-height: 22px;
      margin-bottom: 6px;
    }
    .chat-input-box textarea::placeholder { color: var(--text-muted); }
    .input-actions {
      display: flex; align-items: center; justify-content: space-between;
    }
    .input-hint { font-size: 11px; color: var(--text-muted); }
    .btn-send {
      background: var(--accent);
      border: none; border-radius: var(--r-sm);
      width: 30px; height: 30px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: opacity .15s, background .15s;
    }
    .btn-send:hover { opacity: 0.85; }
    .btn-send:disabled { background: rgba(139,92,246,0.25); cursor: not-allowed; }
    .btn-send svg { width: 13px; height: 13px; fill: #fff; }

    /* ══════════════════════════════════════
       SOURCES PANEL
    ══════════════════════════════════════ */
    .rag-sources {
      background: var(--bg-panel);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    .src-header {
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 6px;
      flex-shrink: 0;
    }
    .src-header-title { font-size: 13px; font-weight: 600; color: var(--text-primary); flex: 1; }
    .src-file-badge {
      font-size: 10.5px;
      background: var(--accent-faint);
      color: var(--accent-light);
      padding: 2px 8px; border-radius: 10px;
      border: 1px solid var(--border-accent);
    }

    /* File list */
    .src-list {
      flex: 1; overflow-y: auto; padding: 8px;
      min-height: 0;
    }
    .src-list::-webkit-scrollbar { width: 3px; }
    .src-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 3px; }

    .src-card {
      padding: 9px 11px; border-radius: var(--r-md); cursor: pointer;
      border: 1px solid transparent; margin-bottom: 4px;
      transition: background .12s, border-color .12s;
    }
    .src-card:hover { background: var(--bg-hover); border-color: var(--border); }
    .src-card.active { background: var(--bg-active); border-color: var(--border-accent); }
    .src-card-name {
      font-size: 12px; font-weight: 600; color: var(--text-primary);
      display: flex; align-items: center; gap: 5px; margin-bottom: 2px;
    }
    .src-card-name .pdf-ico { color: var(--accent); font-size: 12px; }
    .src-card-meta { font-size: 10.5px; color: var(--text-muted); }
    .src-snippet {
      margin-top: 7px; font-size: 11px; color: var(--accent-light); line-height: 1.55;
      padding: 5px 9px; background: rgba(139,92,246,0.08);
      border-left: 2px solid var(--accent); border-radius: 0 5px 5px 0;
      display: none;
    }
    .src-card.active .src-snippet { display: block; }

    /* Empty state in sources */
    .src-empty {
      text-align: center; padding: 24px 12px;
      color: var(--text-muted); font-size: 12px; line-height: 1.7;
    }
    .src-empty-icon { font-size: 28px; margin-bottom: 8px; opacity: 0.4; }

    /* ── TERM LOOKUP (panel bên phải, unified, gọn hơn) ── */
    .panel-lookup {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      padding: 10px 10px 12px;
    }
    .lookup-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.09em;
      color: var(--text-muted); text-transform: uppercase;
      margin-bottom: 7px; display: flex; align-items: center; gap: 5px;
    }
    .lookup-row { display: flex; gap: 5px; }
    .lookup-row input {
      flex: 1;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 6px 9px; font-size: 12px;
      color: var(--text-primary); outline: none;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .lookup-row input::placeholder { color: var(--text-muted); }
    .lookup-row input:focus { border-color: var(--accent); }
    .btn-lookup {
      background: var(--accent-faint);
      border: 1px solid var(--border-accent);
      border-radius: var(--r-sm);
      padding: 6px 11px; color: var(--accent-light);
      font-size: 11.5px; cursor: pointer;
      font-family: inherit;
      transition: background 0.12s;
      white-space: nowrap;
    }
    .btn-lookup:hover { background: rgba(139,92,246,0.28); }
    .lookup-result {
      margin-top: 8px; font-size: 11.5px; color: var(--text-primary);
      line-height: 1.6;
      padding: 7px 10px;
      background: rgba(139,92,246,0.07);
      border-radius: var(--r-sm);
      border: 1px solid var(--border-accent);
      display: none;
    }
    .lookup-result.show { display: block; }

    /* Hidden file input */
    #fileInput { display: none; }

    /* Scrollbar global */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
  </style>
</head>
<body>

<input type="file" id="fileInput" accept=".pdf" multiple/>

<div id="app">

  <!-- ══ SIDEBAR ══ -->
  <aside class="rag-sidebar">
    <div class="sb-logo">
      <div class="sb-logo-icon">📚</div>
      PDF RAG Assistant
    </div>

    <div class="sb-section-label">Workspaces</div>
    <div class="ws-list" id="wsList"></div>

    <div class="create-ws">
      <input type="text" id="newWsInput" placeholder="Tên workspace mới..."/>
      <button class="btn-new-ws" id="btnCreateWs" title="Tạo workspace">+</button>
    </div>

    <hr class="sb-divider"/>

    <!-- Upload — DUY NHẤT 1 chỗ -->
    <div class="upload-zone" id="btnUploadZone">
      <div class="uz-icon">☁️</div>
      <p>Kéo thả PDF vào đây<br/>hoặc <span>chọn file</span></p>
    </div>

    <div class="upload-progress" id="uploadProgress">
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="progress-label" id="progressLabel">Đang xử lý...</div>
    </div>

    <div class="upload-toast" id="uploadToast"></div>

    <hr class="sb-divider"/>

    <div class="sb-tools">
      <button class="tool-btn danger" id="btnClearChat">🗑️&nbsp; Xóa lịch sử chat</button>
    </div>
  </aside>

  <!-- ══ CHAT ══ -->
  <main class="rag-chat">
    <div class="chat-topbar">
      <span class="chat-topbar-title">💬 Chat</span>
      <span class="ws-pill" id="wsPill">—</span>
      <span class="topbar-spacer"></span>
      <!-- Tóm tắt tài liệu chuyển lên topbar -->
      <button class="btn-summarize-top" id="btnSummarize" title="Tóm tắt tài liệu đang chọn">
        📝 Tóm tắt
      </button>
      <span class="api-status" style="margin-left:10px;">
        <span class="api-dot" id="apiDot"></span>
        <span id="apiLabel">API</span>
      </span>
    </div>

    <div class="chat-msgs" id="chatMsgs"></div>

    <div class="chat-input-area">
      <div class="chat-input-box">
        <textarea id="chatInput" rows="1" placeholder="Chọn workspace trước..."></textarea>
        <div class="input-actions">
          <span class="input-hint">Enter gửi · Shift+Enter xuống dòng</span>
          <button class="btn-send" id="btnSend">
            <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </main>

  <!-- ══ SOURCES PANEL ══ -->
  <aside class="rag-sources">
    <div class="src-header">
      <span class="src-header-title">📄 Nguồn tài liệu</span>
      <span class="src-file-badge" id="srcBadge">0 file(s)</span>
    </div>

    <!-- File list only — no duplicate upload here -->
    <div class="src-list" id="srcList"></div>

    <!-- Unified term lookup — chỉ còn 1 chỗ duy nhất -->
    <div class="panel-lookup">
      <div class="lookup-label">🔍 Tra thuật ngữ</div>
      <div class="lookup-row">
        <input type="text" id="peInput" placeholder="gradient descent, Big-O..."/>
        <button class="btn-lookup" id="btnPanelExplain">Tra</button>
      </div>
      <div class="lookup-result" id="peResult"></div>
    </div>
  </aside>

</div>

<script>
// ══════════════════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════════════════
const API = 'http://localhost:8000';

// ══════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════
let workspaces  = [];
let selectedWs  = null;
let chatHistory = [];
let activeSrc   = -1;

// ══════════════════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════════════════
(async function init() {
  bindEvents();
  await checkApiHealth();
  await loadWorkspaces();
  renderAll();
})();

// ══════════════════════════════════════════════════════════════
//  BIND EVENTS
// ══════════════════════════════════════════════════════════════
function bindEvents() {
  document.getElementById('btnCreateWs').addEventListener('click', createWs);
  document.getElementById('btnSummarize').addEventListener('click', doSummarize);
  document.getElementById('btnClearChat').addEventListener('click', doClearChat);
  document.getElementById('btnUploadZone').addEventListener('click', triggerUpload);
  document.getElementById('btnSend').addEventListener('click', sendMsg);
  document.getElementById('btnPanelExplain').addEventListener('click', doPanelExplain);

  document.getElementById('newWsInput').addEventListener('keydown', e => { if (e.key === 'Enter') createWs(); });
  document.getElementById('peInput').addEventListener('keydown', e => { if (e.key === 'Enter') doPanelExplain(); });

  const ta = document.getElementById('chatInput');
  ta.addEventListener('input', () => autoH(ta));
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  });

  document.getElementById('wsList').addEventListener('click', e => {
    const item = e.target.closest('.ws-item');
    if (item) selectWs(item.dataset.wsName);
  });
  document.getElementById('srcList').addEventListener('click', e => {
    const card = e.target.closest('.src-card');
    if (card) toggleSrc(parseInt(card.dataset.srcIdx));
  });
  document.getElementById('chatMsgs').addEventListener('click', e => {
    const chip = e.target.closest('.cite-chip');
    if (chip) highlightSrc(chip.dataset.fileName);
  });

  const fi = document.getElementById('fileInput');
  fi.addEventListener('change', () => uploadFiles(fi.files));

  const zone = document.getElementById('btnUploadZone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('dragover');
    uploadFiles(e.dataTransfer.files);
  });
}

// ══════════════════════════════════════════════════════════════
//  API HEALTH
// ══════════════════════════════════════════════════════════════
async function checkApiHealth() {
  const dot   = document.getElementById('apiDot');
  const label = document.getElementById('apiLabel');
  try {
    const r = await fetch(`${API}/health`, { signal: AbortSignal.timeout(3000) });
    if (r.ok) { dot.className = 'api-dot ok'; label.textContent = 'API online'; }
    else throw new Error();
  } catch {
    dot.className = 'api-dot err'; label.textContent = 'API offline';
  }
}

// ══════════════════════════════════════════════════════════════
//  WORKSPACES
// ══════════════════════════════════════════════════════════════
async function loadWorkspaces() {
  try {
    const r = await fetch(`${API}/api/workspaces`);
    if (!r.ok) throw new Error();
    const raw = await r.json();
    workspaces = await Promise.all(raw.map(async ws => {
      try {
        const fr = await fetch(`${API}/api/workspaces/${encodeURIComponent(ws.name)}/files`);
        const files = fr.ok ? await fr.json() : [];
        return { ...ws, files: files.map(f => typeof f === 'string' ? { name: f } : f) };
      } catch { return { ...ws, files: [] }; }
    }));
  } catch { workspaces = []; }
}

function renderAll() { renderWsList(); renderChat(); renderSources(); }

function renderWsList() {
  const el = document.getElementById('wsList');
  if (!workspaces.length) {
    el.innerHTML = '<div class="ws-empty-hint">Chưa có workspace nào</div>';
    return;
  }
  el.innerHTML = workspaces.map(w => `
    <div class="ws-item ${w.name === selectedWs ? 'active' : ''}" data-ws-name="${esc(w.name)}">
      <span>${w.name === selectedWs ? '📂' : '📁'}</span>
      <span class="ws-item-name">${esc(w.name)}</span>
      <span class="ws-item-count">${w.file_count}</span>
    </div>`).join('');
}

async function selectWs(name) {
  if (name === selectedWs) return;
  selectedWs = name; chatHistory = []; activeSrc = -1;
  await reloadWsFiles(name);
  renderAll();
}

async function reloadWsFiles(name) {
  const idx = workspaces.findIndex(w => w.name === name);
  if (idx < 0) return;
  try {
    const r = await fetch(`${API}/api/workspaces/${encodeURIComponent(name)}/files`);
    const files = r.ok ? await r.json() : [];
    workspaces[idx].files = files.map(f => typeof f === 'string' ? { name: f } : f);
    workspaces[idx].file_count = files.length;
  } catch {}
}

async function createWs() {
  const inp = document.getElementById('newWsInput');
  const name = inp.value.trim();
  if (!name) return;
  inp.value = '';
  try {
    const r = await fetch(`${API}/api/workspaces`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name })
    });
    if (r.status === 201 || r.ok) {
      await loadWorkspaces();
      selectedWs = name; chatHistory = []; activeSrc = -1;
      renderAll();
      showToast(`✅ Đã tạo workspace "${name}"`, false);
    } else { showToast('❌ Không tạo được workspace', true); }
  } catch { showToast('❌ Lỗi kết nối tới server', true); }
}

function doClearChat() { chatHistory = []; renderChat(); }

// ══════════════════════════════════════════════════════════════
//  UPLOAD PDF
// ══════════════════════════════════════════════════════════════
function triggerUpload() {
  if (!selectedWs) { showToast('⚠️ Chọn workspace trước!', true); return; }
  document.getElementById('fileInput').click();
}

async function uploadFiles(fileList) {
  if (!fileList || !fileList.length) return;
  if (!selectedWs) { showToast('⚠️ Chọn workspace trước!', true); return; }

  const progress = document.getElementById('uploadProgress');
  const bar      = document.getElementById('progressBar');
  const lbl      = document.getElementById('progressLabel');
  let done = 0;
  const total = fileList.length;

  progress.classList.add('show'); bar.style.width = '0%';

  for (const file of fileList) {
    lbl.textContent = `Upload: ${file.name} (${done + 1}/${total})...`;
    bar.style.width = `${Math.round((done / total) * 90)}%`;
    const fd = new FormData();
    fd.append('file', file);
    fd.append('workspace_name', selectedWs);
    try {
      const r   = await fetch(`${API}/api/upload`, { method: 'POST', body: fd });
      const res = await r.json();
      if (res.status === 'success') {
        done++;
        showToast(`✅ ${res.file_name}: ${res.chunk_count} chunks · ${res.page_count} trang`, false);
      } else {
        showToast(`❌ ${file.name}: ${res.detail || res.message || 'Upload thất bại'}`, true);
      }
    } catch { showToast(`❌ ${file.name}: Lỗi kết nối`, true); }
  }

  bar.style.width = '100%';
  lbl.textContent = `Hoàn thành ${done}/${total} file`;
  setTimeout(() => progress.classList.remove('show'), 2000);
  document.getElementById('fileInput').value = '';

  await reloadWsFiles(selectedWs);
  renderWsList(); renderSources();
}

// ══════════════════════════════════════════════════════════════
//  SOURCES PANEL
// ══════════════════════════════════════════════════════════════
function renderSources() {
  updatePill();
  const ws    = workspaces.find(w => w.name === selectedWs);
  const files = ws?.files || [];
  document.getElementById('srcBadge').textContent = `${files.length} file(s)`;

  const list = document.getElementById('srcList');
  if (!files.length) {
    list.innerHTML = `<div class="src-empty">
      <div class="src-empty-icon">📂</div>
      <div>Chưa có tài liệu nào.<br/>Upload PDF ở sidebar để bắt đầu.</div>
    </div>`;
    return;
  }

  list.innerHTML = files.map((f, i) => {
    const name = f.name || f;
    return `<div class="src-card ${i === activeSrc ? 'active' : ''}" id="sc${i}" data-src-idx="${i}">
      <div class="src-card-name"><span class="pdf-ico">📕</span>${esc(name)}</div>
      <div class="src-card-meta">${f.page_count ? f.page_count + ' trang · ' : ''}${f.chunk_count ? f.chunk_count + ' chunks' : ''}</div>
      <div class="src-snippet">${f.snippet || 'Nhấn để xem trích đoạn liên quan.'}</div>
    </div>`;
  }).join('');
}

function toggleSrc(i) { activeSrc = activeSrc === i ? -1 : i; renderSources(); }

function highlightSrc(fileName) {
  const ws    = workspaces.find(w => w.name === selectedWs);
  const files = ws?.files || [];
  const i     = files.findIndex(f => (f.name || f) === fileName);
  if (i >= 0) {
    activeSrc = i; renderSources();
    document.getElementById(`sc${i}`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// ══════════════════════════════════════════════════════════════
//  CHAT
// ══════════════════════════════════════════════════════════════
const SAMPLE_QUESTIONS = [
  '📌 Tóm tắt nội dung chính',
  '❓ Giải thích khái niệm quan trọng',
  '📊 So sánh các phương pháp',
  '🔍 Tra cứu ví dụ minh họa',
];

function renderChat() {
  updatePill();
  const el = document.getElementById('chatMsgs');
  if (!selectedWs) {
    el.innerHTML = `<div class="welcome">
      <div class="w-icon">📚</div>
      <h2>PDF RAG Assistant</h2>
      <p>Tạo hoặc chọn một <strong>Workspace</strong> bên trái để bắt đầu.</p>
    </div>`; return;
  }
  if (!chatHistory.length) {
    el.innerHTML = `<div class="welcome">
      <div class="w-icon" style="font-size:38px">💬</div>
      <h2>${esc(selectedWs)}</h2>
      <p>Upload PDF, sau đó đặt câu hỏi về nội dung tài liệu.</p>
      <div class="welcome-chips">
        ${SAMPLE_QUESTIONS.map(q => `<div class="welcome-chip" onclick="prefillQ('${q.replace(/'/g,"\\'")}')"> ${q}</div>`).join('')}
      </div>
    </div>`; return;
  }
  el.innerHTML = chatHistory.map(msgHTML).join('');
  el.scrollTop = el.scrollHeight;
}

function prefillQ(q) {
  const ta = document.getElementById('chatInput');
  ta.value = q;
  ta.focus();
  autoH(ta);
}

function msgHTML(m) {
  const isUser = m.role === 'user';
  const av     = isUser ? '<div class="av user">M</div>' : '<div class="av bot">✦</div>';
  const bub    = `<div class="bub ${isUser ? 'user' : 'bot'}">${m.content}</div>`;
  const chips  = (!isUser && m.citations?.length)
    ? `<div class="cite-chips">${m.citations.map(c =>
        `<span class="cite-chip" data-file-name="${esc(c.file_name)}">
          📄 ${esc(c.file_name)} · Tr.${c.page}${c.heading ? ' · ' + esc(c.heading) : ''}
        </span>`).join('')}</div>` : '';
  const body = `<div style="display:flex;flex-direction:column;gap:5px;max-width:76%">${bub}${chips}</div>`;
  return `<div class="msg ${isUser ? 'user' : ''}">${isUser ? body + av : av + body}</div>`;
}

function addTyping() {
  const el = document.getElementById('chatMsgs');
  const d  = document.createElement('div');
  d.className = 'msg'; d.id = 'typing';
  d.innerHTML = '<div class="av bot">✦</div><div class="bub bot"><div class="typing"><span></span><span></span><span></span></div></div>';
  el.appendChild(d); el.scrollTop = el.scrollHeight;
}
function rmTyping() { document.getElementById('typing')?.remove(); }

async function sendMsg() {
  const inp = document.getElementById('chatInput');
  const q   = inp.value.trim();
  if (!q || !selectedWs) return;
  inp.value = ''; autoH(inp);
  chatHistory.push({ role: 'user', content: esc(q) });
  renderChat(); addTyping();
  try {
    const r = await fetch(`${API}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q, workspace_name: selectedWs, top_k: 5 })
    });
    const d = await r.json(); rmTyping();
    if (!r.ok) {
      chatHistory.push({ role: 'assistant', content: `❌ Lỗi Server: ${d.detail || 'Không rõ nguyên nhân'}`, citations: [] });
    } else {
      chatHistory.push({ role: 'assistant', content: d.answer || 'Không nhận được câu trả lời.', citations: d.citations || [] });
    }
  } catch (e) {
    rmTyping();
    chatHistory.push({ role: 'assistant', content: `❌ Lỗi kết nối: ${e.message}`, citations: [] });
  }
  renderChat();
}

// ══════════════════════════════════════════════════════════════
//  SUMMARIZE
// ══════════════════════════════════════════════════════════════
async function doSummarize() {
  if (!selectedWs) { showToast('⚠️ Chọn workspace trước!', true); return; }
  addTyping();
  try {
    const r = await fetch(`${API}/api/summarize`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ workspace_name: selectedWs })
    });
    const d = await r.json(); rmTyping();
    chatHistory.push({
      role: 'assistant',
      content: '📝 <strong>Tóm tắt:</strong><br/>' + (d.summary || 'Không có nội dung.'),
      citations: []
    });
  } catch (e) { rmTyping(); showToast('Lỗi: ' + e.message, true); }
  renderChat();
}

// ══════════════════════════════════════════════════════════════
//  TERM LOOKUP (sources panel — duy nhất)
// ══════════════════════════════════════════════════════════════
async function doPanelExplain() {
  const term = document.getElementById('peInput').value.trim();
  const res  = document.getElementById('peResult');
  if (!term || !selectedWs) {
    showToast('⚠️ Nhập thuật ngữ và chọn workspace!', true); return;
  }
  res.textContent = 'Đang tra cứu...'; res.classList.add('show');
  try {
    const r = await fetch(`${API}/api/explain`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ term, workspace_name: selectedWs })
    });
    const d = await r.json();
    res.innerHTML = `<strong>${esc(term)}:</strong> ${d.explanation || 'Không tìm thấy.'}`;
  } catch (e) { res.textContent = 'Lỗi: ' + e.message; }
}

// ══════════════════════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════════════════════
let _toastTimer = null;
function showToast(msg, isError = false, ms = 5000) {
  const t = document.getElementById('uploadToast');
  t.textContent = msg;
  t.className   = 'upload-toast show' + (isError ? ' error' : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), ms);
}

// ══════════════════════════════════════════════════════════════
//  TOPBAR PILL
// ══════════════════════════════════════════════════════════════
function updatePill() {
  document.getElementById('wsPill').textContent = selectedWs || '—';
  document.getElementById('chatInput').placeholder =
    selectedWs ? `Hỏi về tài liệu trong "${selectedWs}"...` : 'Chọn workspace trước...';
}

// ══════════════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════════════
function esc(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function autoH(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
</script>
</body>
</html>
